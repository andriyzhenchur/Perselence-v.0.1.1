<style>
/* Robust Responsive CSS Overrides (Immune to React DOM repainting) */

/* ===== HERO CONTAINER ===== */
.landing-hero-container {
  height: auto !important;
  min-height: 100dvh !important;
  width: 100vw !important;
  overflow: clip !important;
  display: block !important;
}

.landing-hero-overlay {
  position: relative !important;
  z-index: 1 !important;
  width: 100% !important;
  min-height: 100dvh !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  padding: clamp(1rem, 3vh, 2rem) 1rem clamp(3.5rem, 8vh, 4.5rem) !important;
  box-sizing: border-box !important;
}

/* Wait, in App.jsx landing-hero-main-content holds the logo/text/btn, overlay holds main-content AND footer */
.landing-hero-main-content {
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  width: 100% !important;
  position: relative !important;
}

/* ===== HERO FOOTER (copyright) - pinned independently ===== */
.landing-hero-footer {
  position: absolute !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  width: 100% !important;
  text-align: center !important;
  margin: 0 !important;
  padding: 0 !important;
  color: rgba(0,0,0,0.5) !important;
  bottom: max(env(safe-area-inset-bottom), clamp(1rem, 3vh, 2rem)) !important;
  font-size: clamp(0.7rem, 1.5vw, 0.85rem) !important;
}

/* ===== HERO TYPOGRAPHY ===== */
.landing-hero-logo { height: clamp(32px, 5vw, 50px) !important; margin-bottom: clamp(1.25rem, 4vh, 2rem) !important; }
.landing-hero-text-container { text-align: center !important; gap: clamp(0.75rem, 2vh, 1.25rem) !important; max-width: 800px !important; margin-bottom: clamp(1.5rem, 5vh, 2.75rem) !important; display: flex !important; flex-direction: column !important; }
.landing-hero-title { font-size: clamp(2rem, 6vw, 4rem) !important; line-height: 1.15 !important; margin: 0 !important; font-weight: 500 !important; letter-spacing: -0.02em !important; }
.landing-hero-description { font-size: clamp(1rem, 2.5vw, 1.4rem) !important; margin: 0 auto !important; max-width: 600px !important; color: inherit !important; font-weight: 400 !important; }
.landing-hero-cta { margin: 0 !important; }
.landing-hero-btn { padding: clamp(0.9rem, 2vw, 1.3rem) clamp(2rem, 4vw, 3.2rem) !important; font-size: clamp(1.1rem, 2vw, 1.35rem) !important; font-weight: 500 !important; cursor: pointer !important; }

/* ===== LANDSCAPE HERO TWEAKS ===== */
@media (max-height: 500px) and (orientation: landscape) {
  html, body, #root {
    margin: 0 !important;
    padding: 0 !important;
    height: 100svh !important;
    min-height: 100svh !important;
